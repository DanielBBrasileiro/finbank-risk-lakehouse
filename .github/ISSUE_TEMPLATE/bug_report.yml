name: Bug report
description: Report a reproducible problem in the local portfolio workflow.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the command, error and affected component.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest sequence that reproduces the problem from a clean state.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Full Git commit SHA.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Rust, Docker and database target.
    validations:
      required: true
