version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: customers
      - name: accounts
      - name: transactions
      - name: loans
      - name: macro_indicators
      - name: ai_copilot_audit

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: segment
        data_tests:
          - not_null
          - accepted_values:
              values: ["PF_LOW_INCOME", "PF_MASS", "PF_AFFLUENT", "PJ_SMALL", "PJ_MID"]
      - name: document_type
        data_tests:
          - not_null
          - accepted_values:
              values: ["CPF", "CNPJ"]

  - name: stg_transactions
    columns:
      - name: transaction_id
        data_tests:
          - unique
          - not_null
      - name: amount
        data_tests:
          - not_null
      - name: customer_id
        data_tests:
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: account_id
        data_tests:
          - relationships:
              to: ref('stg_accounts')
              field: account_id
      - name: channel
        data_tests:
          - accepted_values:
              values: ["PIX", "CARD", "ATM", "BRANCH", "TED", "APP"]
      - name: transaction_type
        data_tests:
          - accepted_values:
              values: ["DEBIT", "CREDIT", "TRANSFER", "PAYMENT", "WITHDRAWAL"]

  - name: stg_loans
    columns:
      - name: loan_id
        data_tests:
          - unique
          - not_null
      - name: risk_rating
        data_tests:
          - accepted_values:
              values: ["AA", "A", "B", "C", "D", "E"]
      - name: customer_id
        data_tests:
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: stg_macro_indicators
    description: Normalized BCB macroeconomic indicators used for credit portfolio context.
    columns:
      - name: observation_date
        data_tests:
          - not_null
      - name: indicator_name
        data_tests:
          - not_null
          - accepted_values:
              values: ["selic", "credit_free_total"]
      - name: value
        data_tests:
          - not_null

  - name: stg_accounts
    columns:
      - name: account_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: account_type
        data_tests:
          - accepted_values:
              values: ["CHECKING", "SAVINGS", "INVESTMENT"]
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ["ACTIVE", "BLOCKED", "CLOSED"]
